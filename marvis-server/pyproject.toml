[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "D",    # pydocstyle (docstrings)
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "C90",  # mccabe complexity
    "S",    # flake8-bandit (security)
]
ignore = [
    "D100",  # Missing docstring in public module
    "D104",  # Missing docstring in public package
    "D105",  # Missing docstring in magic method
    "D107",  # Missing docstring in __init__
    "S104",  # Binding to 0.0.0.0 (needed for Docker)
    "B008",  # FastAPI uses Depends() in argument defaults by design
    "S105",  # False positive — flags error message strings as hardcoded passwords
    "D205",  # Summary line allowed to wrap when it exceeds line length
    "E712",  # SQLAlchemy boolean column comparisons require == True syntax
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"alembic/*" = ["D", "E402"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
