services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./marvis-server/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./marvis-server
    restart: unless-stopped
    env_file:
      - ./marvis-server/.env
    environment:
      DATABASE_HOST: db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./marvis-client
    restart: unless-stopped
    env_file:
      - ./marvis-client/.env
    ports:
      - "4173:4173"
    depends_on:
      - server

volumes:
  postgres_data:
